- name: Automatizar configuracion de servidores Ubuntu
  hosts: servidores
  become: yes

  tasks:
    - name: Actualizar paquetes APT
      apt:
        update_cache: yes

    - name: Crear usuario itla
      user:
        name: itla
        state: present
        shell: /bin/bash
        create_home: yes

    - name: Crear carpeta app
      file:
        path: /home/ansible/app
        state: directory
        owner: ansible
        group: ansible
        mode: '0755'

    - name: Crear archivo hola.txt
      copy:
        dest: /home/ansible/app/hola.txt
        content: "Hola Mundo desde Ansible en servidores Ubuntu\n"
        owner: ansible
        group: ansible
        mode: '0644'

    - name: Instalar cowsay y htop
      apt:
        name:
          - cowsay
          - htop
        state: present
